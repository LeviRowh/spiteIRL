<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Live Preview (HLS + FastAPI Controls)</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #111;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: #eee;
      }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 16px; }
      .panel { width: min(1100px, 96vw); }
      video {
        width: min(1100px, 96vw);
        height: auto;
        background: black;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,.35);
      }
      .row { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
      button { padding: 10px 14px; border: 0; border-radius: 10px; cursor: pointer; font-weight: 600; }
      .status { margin-left: auto; color: #bbb; font-size: 14px; }
      .hint { margin-top: 10px; color: #bbb; font-size: 14px; line-height: 1.35; }
      code { background: #222; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="panel">
        <video id="v" autoplay muted playsinline controls></video>

        <div class="row">
          <button id="start">Start stream</button>
          <button id="stop">Stop stream</button>
          <button id="reload">Reload player</button>
          <button id="unmute">Unmute</button>
          <div class="status" id="status">Status: unknown</div>
        </div>

        <div class="hint">
          Autoplay usually requires muted video. This starts muted; use Unmute if needed.
          Stream path: <code>/hls/stream.m3u8</code>
        </div>
      </div>
    </div>

    <script>
      const video = document.getElementById("v");
      const statusEl = document.getElementById("status");

      const startBtn = document.getElementById("start");
      const stopBtn = document.getElementById("stop");
      const reloadBtn = document.getElementById("reload");
      const unmuteBtn = document.getElementById("unmute");

      // Cache-bust so we don't get a stale playlist after restarting FFmpeg
      const streamUrl = () => `/hls/stream.m3u8?v=${Date.now()}`;

      async function safePlay() {
        try { await video.play(); } catch (_) {}
      }

      function setStatus(running, extra = "") {
        statusEl.textContent = `Status: ${running ? "RUNNING" : "STOPPED"}${extra ? " — " + extra : ""}`;
      }

      async function apiStatus() {
        const res = await fetch("/api/status", { cache: "no-store" });
        const data = await res.json();
        return !!data.running;
      }

      function destroyHls() {
        if (window._hls) {
          try { window._hls.destroy(); } catch (_) {}
          window._hls = null;
        }
      }

      function attachStream() {
        const src = streamUrl();

        // Native HLS (Safari)
        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          destroyHls();
          video.src = src;
          safePlay();
          return;
        }

        // HLS.js (Chrome/Firefox/Edge)
        if (window.Hls && Hls.isSupported()) {
          destroyHls();

          const hls = new Hls({});
          window._hls = hls;

          hls.loadSource(src);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, safePlay);
          hls.on(Hls.Events.ERROR, (e, data) => {
            console.error("HLS error:", data);
          });
          return;
        }

        alert("This browser can't play HLS.");
      }

      async function waitForPlaylist(timeoutMs = 12000) {
        const start = Date.now();
        while (Date.now() - start < timeoutMs) {
          try {
            const res = await fetch(streamUrl(), { cache: "no-store" });
            if (res.ok) return true;
          } catch (_) {}
          await new Promise(r => setTimeout(r, 250));
        }
        return false;
      }

      async function startAndAutoLoad() {
        startBtn.disabled = true;
        setStatus(false, "starting...");

        try {
          const res = await fetch("/api/start", { method: "POST" });
          const data = await res.json();

          if (!data.running) {
            setStatus(false, "failed to start");
            return;
          }

          setStatus(true, "waiting for stream...");

          // Wait a few seconds for FFmpeg to generate the first HLS segments
          await new Promise(resolve => setTimeout(resolve, 10000));

          attachStream();
          setStatus(true, "playing");

        } catch (e) {
          console.error(e);
          setStatus(false, "error starting stream");
        } finally {
          startBtn.disabled = false;
        }
      }

      async function stopStream() {
        stopBtn.disabled = true;

        try {
          const res = await fetch("/api/stop", { method: "POST" });
          const data = await res.json();

          destroyHls();

          // Clear video so it doesn't freeze on the last frame
          video.pause();
          video.removeAttribute("src");
          video.load();

          setStatus(!!data.running, data.message || "");
        } catch (e) {
          console.error(e);
          setStatus(false, "error stopping stream");
        } finally {
          stopBtn.disabled = false;
        }
      }

      // Button wiring
      startBtn.addEventListener("click", startAndAutoLoad);

      reloadBtn.addEventListener("click", () => {
        attachStream();
        setStatus(true, "reloaded");
      });

      stopBtn.addEventListener("click", stopStream);

      unmuteBtn.addEventListener("click", () => {
        video.muted = false;
        safePlay();
      });

      // On page load: show status, and if already running, attach automatically
      (async () => {
        try {
          const running = await apiStatus();
          if (running) {
            setStatus(true, "loading...");
            const ok = await waitForPlaylist(8000);
            if (ok) {
              attachStream();
              setStatus(true, "playing");
            } else {
              setStatus(true, "running, but playlist not found yet");
            }
          } else {
            setStatus(false);
          }
        } catch (e) {
          console.error(e);
          statusEl.textContent = "Status: error contacting backend";
        }
      })();
    </script>
  </body>
</html>
