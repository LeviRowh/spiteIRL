<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/webAppCommands.js" defer></script>
    <title>Live Preview (HLS + FastAPI Controls)</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  </head>

  <body>
    <div class="wrap">
      <div class="panel">
        <video id="v" autoplay muted playsinline controls></video>

        <div class="row">
          <button id="start">Start stream</button>
          <button id="stop">Stop stream</button>
          <button id="reload">Reload player</button>
          <button id="unmute">Unmute</button>
          <form action="/logout" method="get" style="display:inline;">
            <button type="submit">Logout</button>
          </form>
          <div class="status" id="status">Status: unknown</div>
        </div>

        <div class="hint">
          Autoplay usually requires muted video. This starts muted; use Unmute if needed.
          Stream path: <code>/hls/stream.m3u8</code>
        </div>
      </div>
    </div>
  </body>
</html>
