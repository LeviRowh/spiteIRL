<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="static/style.css">
        <script src="/static/webAppCommands.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Spite Dashboard</title>
    </head>
    <body>
        <main>
            <header role="Banner">
                <h2 id="title">Spite IRL</h2>
                <form id="logout" action="/logout" method="get" style="display:inline;">
                    <button type="submit">Logout</button>
                </form>
            </header>
            <div class="block" role="main">
                <h3>Preview</h3>
                <video id="v" autoplay muted playsinline controls></video>
                <div class="status" id="status">Status: Loading...</div>
            </div>
            <div class="block" role="contentinfo">
                <h3>Stream Destinations</h3>
                <p class="hint">Add a destination below, then press <strong>Go Live</strong> to start streaming to that platform.</p>
                <div class="row">
                    <label for="platform">Platform:</label>
                    <select id="platform">
                        <option value="twitch">Twitch</option>
                        <option value="youtube">YouTube</option>
                        <option value="custom">Custom RTMP</option>
                    </select>
                    <label for="destLabel">Label:</label>
                    <input id="destLabel" type="text" placeholder="e.g. My Twitch" />
                    <label for="streamKey">Stream Key:</label>
                    <input id="streamKey" type="password" placeholder="Paste your stream key here" />
                    <button id="addDestination">Add Destination</button>
                </div>
                <div id="destStatus"></div>
                <div id="destinationList"></div>
            </div>
            <div class="block charts-block">
                <h3>Stream Metrics</h3>
                <div class="charts-row">
                    <div class="chart-wrap">
                        <canvas id="fpsChart"></canvas>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="qualityChart"></canvas>
                    </div>
                </div>
                <script src="/static/plot.js"></script>
            </div>
        </main>
    </body>
</html>
