<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="static/style.css">
        <script src="/static/webAppCommands.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Spite Dashboard</title>
    </head>
    <body>
        <!--Wrapper-->
        <main>
            <!--Header + Logout-->
            <header role="Banner">
                <h2 id="title">Spite IRL</h2>
                <form id="logout" action="/logout" method="get" style="display:inline;">
                    <button type="submit">Logout</button>
                </form>
            </header>
            <!--Preview Block-->
            <div class="block" role="main">
                <h3>Preview</h3>
                <video id="v" autoplay muted playsinline controls></video>
                <!--Buttons-->
                <div>
                    <button id="start">Start stream</button>
                    <button id="stop">Stop stream</button>
                </div>
                <div class="status" id="status">Status: Stopped</div>
            </div>
            <!--Destinations-->
            <div class="block" role="contentinfo">
                <h3>Destination Streaming</h3>
                <!--Destination Select-->
                <div class="row">
                    <label for="platform">Platform:</label><select id="platform">
                        <option value="twitch">Twitch</option>
                        <option value="youtube">YouTube</option>
                        <option value="custom">Custom RTMP</option>
                    </select>

                    <input id="destLabel" type="text" placeholder="Label (ex: My YouTube)" />
                    <input id="streamKey" type="text" placeholder="Stream key or RTMP URL" />
                    <button id="addDestination">Add Destination</button>
                </div>
                <!--Destination Status-->
                <div id="destStatus"></div>
                <div id="destinationList"></div>
            </div>
            <!--Plot Statistics-->
            <div>
                <canvas id="fpsChart"></canvas>
                <canvas id="qualityChart"></canvas>
            </div>
            <script src="plot.js"></script>
        </main>
    </body>
</html>
